name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LibraryInventoryApi.sln

      - name: Build
        run: dotnet build LibraryInventoryApi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test LibraryInventoryApi.sln --no-build --configuration Release --verbosity normal
