server:
  port: 8080

spring:
  application:
    name: crm-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/crm_platform
    username: ${DB_USERNAME:crm_user}
    password: ${DB_PASSWORD:crm_password}

  jpa:
    hibernate:
      # 'update' is fine while you're iterating on entities in Phases 4-5.
      # Switch to 'validate' (and manage schema via database/schema.sql or
      # Flyway) once the schema stabilizes - never use 'update' in production.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Phase 11 - Actuator / Micrometer endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Phase 3 - OpenAPI / Swagger UI at /swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# Phase 4 - JWT settings (override JWT_SECRET via env var before going anywhere near production)
jwt:
  secret: ${JWT_SECRET:change-this-secret-its-only-for-local-dev-min-256-bits}
  expiration-ms: 86400000
